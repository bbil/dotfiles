set-option -g default-shell /bin/zsh

set-option -g default-terminal "tmux-256color"

set -g mouse on

# Attach to an open tmux session when killing the current one
set -g detach-on-destroy off

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Make panes look __fresh___
set -g pane-border-indicators both # off/colour/arrows/both
set -g pane-border-lines heavy

# Status bar on top
set-option -g status-position top

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Split keybindings
unbind '"'
unbind %
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# make last session binding easier to type
unbind L
bind l switch-client -l

# Window move mode (prefix + M)
# Enters a persistent mode for repositioning the current window.
# h/l to swap left/right, Escape to exit. Status bar shows a pill
# indicator for any active mode (including copy-mode).
bind M set key-table window-move\; refresh-client -S
bind -T window-move h swap-window -t -1\; select-window -t -1\; refresh-client -S
bind -T window-move l swap-window -t +1\; select-window -t +1\; refresh-client -S
bind -T window-move Escape set -u key-table\; refresh-client -S

# Pane move mode (prefix + m)
# Enters a persistent mode for repositioning the current pane.
# h/j/k/l to swap in that direction, Escape to exit.
# Uses run-shell because tmux has no directional swap-pane target
# tokens — we select the neighbor, capture its ID, then swap by ID.
bind m set key-table pane-move\; refresh-client -S
bind -T pane-move h run-shell 'P=#{pane_id}; tmux select-pane -L && T=$(tmux display-message -p "##{pane_id}") && tmux swap-pane -s "$P" -t "$T" && tmux select-pane -t "$P"; tmux refresh-client -S'
bind -T pane-move j run-shell 'P=#{pane_id}; tmux select-pane -D && T=$(tmux display-message -p "##{pane_id}") && tmux swap-pane -s "$P" -t "$T" && tmux select-pane -t "$P"; tmux refresh-client -S'
bind -T pane-move k run-shell 'P=#{pane_id}; tmux select-pane -U && T=$(tmux display-message -p "##{pane_id}") && tmux swap-pane -s "$P" -t "$T" && tmux select-pane -t "$P"; tmux refresh-client -S'
bind -T pane-move l run-shell 'P=#{pane_id}; tmux select-pane -R && T=$(tmux display-message -p "##{pane_id}") && tmux swap-pane -s "$P" -t "$T" && tmux select-pane -t "$P"; tmux refresh-client -S'
bind -T pane-move Escape set -u key-table\; refresh-client -S

# Primeagen Sessionizer
bind-key f run-shell "~/.local/bin/tmux-sessionizer"

# PLUGINS - https://github.com/tmux-plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-fzf-options '--tmux center,100%,50% --multi -0 --exit-0 --no-preview --reverse'
set -g @fzf-url-bind 'o'

# set -g @plugin "arcticicestudio/nord-tmux"
set -g @plugin 'catppuccin/tmux'

# Catppuccin theme settings
set -g @catppuccin_flavour 'macchiato' # or frappe, macchiato, mocha

set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"

set -g @catppuccin_window_status_style "rounded"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
# Status right: mode indicator pill, then catppuccin modules
# Shows a green pill for active pane modes (copy-mode) or custom key tables (window-move)
set -g status-right "#{?#{pane_in_mode},#[fg=#{@thm_green}]#[bg=#{@thm_green}#,fg=#{@thm_crust}] #{pane_mode} #[fg=#{@thm_green}#,bg=default]#[default] ,}"
set -ag status-right "#{?#{||:#{==:#{client_key_table},root},#{==:#{client_key_table},prefix}},,#[fg=#{@thm_green}]#[bg=#{@thm_green}#,fg=#{@thm_crust}] #{client_key_table} #[fg=#{@thm_green}#,bg=default]#[default] }"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

set -ogq @catppuccin_window_current_number_color "#{@thm_red}"
set -ogq @catppuccin_window_number_color "#{@thm_mauve}"

run '~/.tmux/plugins/tpm/tpm'

bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "Sourced"

